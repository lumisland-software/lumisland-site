<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Lumisland</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin-page">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="Voltar para Lumisland">
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
          <rect x="8" y="43" width="39" height="9" rx="2" fill="#F6B84B"></rect>
          <path d="M16 43h12V19l-6-9-6 9v24Z" fill="#27C7B8"></path>
          <circle cx="22" cy="8" r="3" fill="#F6B84B"></circle>
          <path d="M30 43h16l7 9H30v-9Z" fill="#EAF2FF"></path>
        </svg>
        <span class="brand-word">Lumisland Admin</span>
      </a>
      <nav class="site-nav">
        <a href="index.html">Ver site</a>
      </nav>
    </div>
  </header>

  <main class="admin-hero">
    <div class="container">
      <p class="eyebrow"><span class="eyebrow-line"></span> Painel simples</p>
      <h1>Editar conte&uacute;do sem abrir o c&oacute;digo.</h1>
      <p class="admin-lead">Esta vers&atilde;o guarda altera&ccedil;&otilde;es no navegador e permite exportar um JSON. Para publicar automaticamente no site, o pr&oacute;ximo passo t&eacute;cnico &eacute; ligar um CMS ou backend seguro.</p>

      <form id="admin-form" class="admin-panel">
        <label>
          T&iacute;tulo principal
          <input id="headline" type="text" value="Transformamos processos confusos em sistemas simples de usar.">
        </label>
        <label>
          Texto de apoio
          <textarea id="subheadline" rows="4">A Lumisland cria sistemas digitais para pequenos neg&oacute;cios que querem trabalhar com mais clareza e reduzir trabalho manual.</textarea>
        </label>
        <label>
          Texto do bot&atilde;o principal
          <input id="primaryCta" type="text" value="Pedir uma proposta">
        </label>
        <label>
          E-mail de contacto
          <input id="email" type="email" value="contato.lumisland@gmail.com">
        </label>
        <div class="admin-actions">
          <button class="button button-primary" type="button" id="export-content">Exportar JSON</button>
          <button class="button button-dark" type="button" id="reset-content">Limpar altera&ccedil;&otilde;es</button>
        </div>
      </form>

      <div id="admin-preview" class="admin-preview"></div>
    </div>
  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
